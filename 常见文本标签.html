    <p>更改文本样式；<b>这个是加粗也就是《b》小写的尖括号</b>
    <h3><i>i 是斜体</h3>
    <h4></i><i>i 是斜体</h4>
    <h5><u>u是下划线</u></h5>   
    <h6>  <s> s 是删除线</s></h6>
    </p>
    <ul>
        <li>没有数字的竖排</li>
        <li>没有数字的竖排</li>
        <li>没有数字的竖排</li>
    </ul>
    <ol>
        <li>有数字的竖排</li>
    </ol>


    <h1>table row 表格</h1>
    <h1>table data  表格数据</h1>

   <table border="1">
    <tr>
        <th>列标题1</th>
        <th>列标题2</th>
    </tr>
   <tr>

   </tr>

   <tr>
